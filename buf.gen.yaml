version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: cpsat-scheduler/internal/pb
plugins:
  - local: protoc-gen-go
    out: internal/pb
  - local: protoc-gen-go-grpc
    out: internal/pb
  - protoc_builtin: python
    out: cpsat-model/pb
  - local: python-grpc-tools-protoc
    out: cpsat-model/pb
inputs:
  - directory: proto
