syntax = "proto3";

import "google/protobuf/timestamp.proto";

// AtomicUnit indicates that the given value is in terms of the atomic unit
message AtomicUnit {
  int64 value = 1;
}

message AtomicInterval {
  AtomicUnit start = 1;
  AtomicUnit end = 2;
}

message Interval {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message Entry {
  int64 id = 1;
  string name = 2;
}

