syntax = "proto3";

import "google/protobuf/timestamp.proto";

message ProfileEntry {
  int64 id = 1;
  string name = 2;
}

message DurState {
  int64 pes = 1;
  int64 exp = 2;
  int64 opt = 3;

  optional google.protobuf.Timestamp deadline = 4;
  // zero if null
  int64 total_cost = 5;
}

message ChildrenConfigState {
  string desc = 1;
  optional google.protobuf.Timestamp deadline = 2;
  // zero if null
  int64 exp_cost = 3;
  repeated int64 children = 4;
}

message TaskState {
  string name = 1;
  string desc = 2;
  int64 timescale = 3;

  optional DurState duration_cfg = 4;
  repeated ChildrenConfigState children_cfgs = 5;

  repeated int64 prereqs = 6;
  repeated int64 postreqs = 7;
  optional int64 parent = 8;

  optional google.protobuf.Timestamp start = 9;
  optional google.protobuf.Timestamp end = 10;
}

message TaskEntry {
  int64 id = 1;
  string name = 2;
}

// ListProfiles
message ListProfilesRequest {}
message ListProfilesResponse {
  repeated ProfileEntry entries = 1;
}

// ReadTask
message ReadTaskRequest {
  int64 id = 1;
}
message ReadTaskResponse {
  TaskState state = 1;
}

// SaveTask
message SaveTaskRequest {
  optional int64 id = 1;
  int64 profile_id = 2;
  TaskState state = 3;
}
message SaveTaskResponse {
  int64 id = 1;
}

// DeleteTask
message DeleteTaskRequest {
  int64 id = 1;
}
message DeleteTaskResponse {}

// ListScheduledTasks
message ListScheduledTasksRequest {
  int64 profile_id = 1;
  int64 timescale = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
}
message ListScheduledTasksResponse {
  repeated TaskEntry entries = 1;
}

// ListPossibleRelatives
message ListPossibleRelativesRequest {
  enum RelativeType {
    PARENT = 0;
    CHILD = 1;
    PREREQ = 2;
    POSTREQ = 3;
  }
  RelativeType type = 1;
  int64 task_id = 2;
}
message ListPossibleRelativesResponse {
  repeated TaskEntry entries = 1;
}

// ProgressUpdate
message ProgressUpdateRequest {
  int64 target_task_id = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
}
message ProgressUpdateResponse {}

service API {
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc ReadTask(ReadTaskRequest) returns (ReadTaskResponse);
  rpc SaveTask(SaveTaskRequest) returns (SaveTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ListScheduledTasks(ListScheduledTasksRequest) returns (ListScheduledTasksResponse);
  rpc ListPossibleRelatives(ListPossibleRelativesRequest) returns (ListPossibleRelativesResponse);
  rpc ProgressUpdate(ProgressUpdateRequest) returns (ProgressUpdateResponse);
}

