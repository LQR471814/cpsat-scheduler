syntax = "proto3";

import "commonpb/types.proto";

message CostInterval {
  AtomicUnit start = 1;
  AtomicUnit end = 2;
  int64 cost = 3;
}

message DurConfig {
  repeated CostInterval intervals = 1;
  AtomicUnit duration = 2;
}

message ChildrenConfig {
  repeated CostInterval intervals = 1;
  repeated int64 children = 2;
}

message Task {
  int64 id = 1;
  AtomicUnit unit = 2;
  optional AtomicUnit start = 3;
  optional AtomicUnit end = 4;

  repeated int64 prereqs = 5;
  repeated DurConfig dur_cfgs = 6;
  repeated ChildrenConfig children_cfgs = 7;
}

message SolvedTask {
  // the id passed in the request
  int64 id = 1;
  AtomicUnit start = 2;
  // the config selected
  oneof config {
    // the id of the duration config
    int64 dur_idx = 3;
    // the id of the children config
    int64 children_idx = 4;
  };
  // the cost used
  int64 cost = 5;
  AtomicUnit duration = 6;
  AtomicUnit end = 7;
}

enum SolveStatus {
  FEASIBLE = 0;
  INFEASIBLE = 1;
  MODEL_INVALID = 2;
  OPTIMAL = 3;
  UNKNOWN = 4;
}

// Solve
message SolveRequest {
  AtomicInterval horizon = 1;
  repeated Task tasks = 2;
}
message SolveResponse {
  SolveStatus status = 1;
  int64 score = 2;
  repeated SolvedTask solution = 3;
}

service Solver {
  rpc Solve(SolveRequest) returns (SolveResponse);
}
