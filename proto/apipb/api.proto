syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "commonpb/types.proto";

message PERT {
  google.protobuf.Duration pes = 1;
  google.protobuf.Duration exp = 2;
  google.protobuf.Duration opt = 3;
}

message DurState {
  PERT pert = 1;
  optional google.protobuf.Timestamp deadline = 2;
  // zero if null
  int64 total_cost = 3;
}

message ChildrenConfigState {
  string desc = 1;
  optional google.protobuf.Timestamp deadline = 2;
  // zero if null
  int64 exp_cost = 3;
  repeated Entry children = 4;
}

message TaskState {
  string name = 1;
  string desc = 2;
  int64 timescale = 3;

  optional DurState duration_cfg = 4;
  repeated ChildrenConfigState children_cfgs = 5;

  repeated Entry prereqs = 6;
  repeated Entry postreqs = 7;
  optional Entry parent = 8;

  optional google.protobuf.Timestamp start = 9;
  optional google.protobuf.Timestamp end = 10;
}

// CreateProfile
message CreateProfileRequest {
  string name = 1;
  google.protobuf.Duration atomic_timescale = 2;
  google.protobuf.Timestamp universe_start = 3;
  int64 gen_pert_choices = 4;
}
message CreateProfileResponse {}

message Profile {
  int64 id = 1;
  string name = 2;
  google.protobuf.Duration atomic_timescale = 3;
  google.protobuf.Timestamp universe_start = 4;
  optional int64 gen_pert_choices = 5;
}

// ListProfiles
message ListProfilesRequest {}
message ListProfilesResponse {
  repeated Profile entries = 1;
}

// RemoveProfile
message RemoveProfileRequest {
  int64 id = 1;
}
message RemoveProfileResponse {}

// ReadTask
message ReadTaskRequest {
  int64 id = 1;
}
message ReadTaskResponse {
  TaskState state = 1;
}

// SaveTask
message SaveTaskRequest {
  optional int64 id = 1;
  int64 profile_id = 2;
  TaskState state = 3;
}
message SaveTaskResponse {
  int64 id = 1;
}

// DeleteTask
message DeleteTaskRequest {
  int64 id = 1;
}
message DeleteTaskResponse {}

// RecomputeSchedule
message RecomputeScheduleRequest {
  int64 profile = 1;
  Interval horizon = 2;
}
message RecomputeScheduleResponse {}

// ListScheduledTasks
message ListScheduledTasksRequest {
  int64 profile_id = 1;
  optional int64 timescale = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
}
message ListScheduledTasksResponse {
  repeated Entry entries = 1;
}

// ListPossibleRelatives
message ListPossibleRelativesRequest {
  enum RelativeType {
    PARENT = 0;
    CHILD = 1;
    PREREQ = 2;
    POSTREQ = 3;
  }
  RelativeType type = 1;
  int64 task_id = 2;
}
message ListPossibleRelativesResponse {
  repeated Entry entries = 1;
}

// ListProgressUpdates
message ListProgressUpdatesRequest {
  int64 profile = 1;
  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;
}
message ListProgressUpdatesResponse {
  message ProgressLog {
    message UpdatedTask {
      Entry task = 1;
      string desc = 2;
    }
    int64 id = 1;
    google.protobuf.Timestamp time = 2;
    string desc = 3;
    repeated UpdatedTask updates = 4;
  }
  repeated ProgressLog logs = 1;
}

// ProgressUpdate
message ProgressUpdateRequest {
  message UpdatedTask {
    int64 task = 1;
    string desc = 2;
  }
  int64 profile = 1;
  google.protobuf.Timestamp time = 2;
  string desc = 3;
  repeated UpdatedTask updates = 4;
}
message ProgressUpdateResponse {
  int64 id = 1;
}

// EditProgressLog
message EditProgressLogRequest {
  message UpdatedTask {
    int64 task = 1;
    string desc = 2;
  }
  int64 id = 1;
  google.protobuf.Timestamp time = 2;
  string desc = 3;
  repeated UpdatedTask updates = 4;
}
message EditProgressLogResponse {}

// DeleteProgressLog
message DeleteProgressLogRequest {
  int64 id = 1;
}
message DeleteProgressLogResponse {}

// GetLastCheckpoint
message GetLastCheckpointRequest {
  int64 profile = 1;
}
message GetLastCheckpointResponse {
  optional google.protobuf.Timestamp time = 1;
}

message Event {
  int64 profile = 1;
  string name = 2;
  string desc = 3;
  google.protobuf.Timestamp start = 4;
  google.protobuf.Timestamp end = 5;
}

// CreateEvent
message CreateEventRequest {
  repeated Event event = 1;
}
message CreateEventResponse {}

// ReadEvent
message ReadEventRequest {
  int64 id = 1;
}
message ReadEventResponse {
  Event event = 1;
}

// UpdateEvent
message UpdateEventRequest {
  int64 id = 1;
  Event event = 2;
}
message UpdateEventResponse {}

// ListEvent
message ListEventRequest {
  int64 profile = 1;
}
message ListEventResponse {
  repeated Entry entries = 1;
}

// RemoveEvent
message RemoveEventRequest {
  int64 id = 1;
}
message RemoveEventResponse {}

service API {
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
  rpc RemoveProfile(RemoveProfileRequest) returns (RemoveProfileResponse);

  rpc ReadTask(ReadTaskRequest) returns (ReadTaskResponse);
  rpc SaveTask(SaveTaskRequest) returns (SaveTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ListPossibleRelatives(ListPossibleRelativesRequest) returns (ListPossibleRelativesResponse);

  rpc RecomputeSchedule(RecomputeScheduleRequest) returns (RecomputeScheduleResponse);
  rpc ListScheduledTasks(ListScheduledTasksRequest) returns (ListScheduledTasksResponse);

  rpc ListProgressUpdates(ListProgressUpdatesRequest) returns (ListProgressUpdatesResponse);
  rpc ProgressUpdate(ProgressUpdateRequest) returns (ProgressUpdateResponse);
  rpc EditProgressLog(EditProgressLogRequest) returns (EditProgressLogResponse);
  rpc DeleteProgressLog(DeleteProgressLogRequest) returns (DeleteProgressLogResponse);
  rpc GetLastCheckpoint(GetLastCheckpointRequest) returns (GetLastCheckpointResponse);

  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc ReadEvent(ReadEventRequest) returns (ReadEventResponse);
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  rpc ListEvent(ListEventRequest) returns (ListEventResponse);
  rpc RemoveEvent(RemoveEventRequest) returns (RemoveEventResponse);
}

